version: '3.8'

services:
  ai-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-orchestrator
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=AI Orchestrator
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite:///./data/ai_orchestrator.db
      - LLM_PROVIDER=openai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - ENABLE_TELEGRAM_POLLING=false
      - FRONTEND_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - MAX_AGENT_ITERATIONS=5
      - DEFAULT_AGENT_TIMEOUT_SECONDS=120
      - SCHEDULER_MAX_CONCURRENT_JOBS=5
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app  # For development hot-reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ai-orchestrator-network

  # Optional: Ollama service for local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks:
      - ai-orchestrator-network
    # Uncomment if you have GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama-data:
    driver: local

networks:
  ai-orchestrator-network:
    driver: bridge
