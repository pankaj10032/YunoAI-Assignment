---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-orchestrator
  labels:
    name: ai-orchestrator

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-orchestrator-config
  namespace: ai-orchestrator
data:
  APP_NAME: "AI Orchestrator"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DATABASE_URL: "sqlite:///./data/ai_orchestrator.db"
  LLM_PROVIDER: "openai"
  OPENAI_MODEL: "gpt-4o-mini"
  OLLAMA_BASE_URL: "http://ollama:11434"
  OLLAMA_MODEL: "llama3.1"
  FRONTEND_URL: "http://localhost:3000"
  CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
  MAX_AGENT_ITERATIONS: "5"
  DEFAULT_AGENT_TIMEOUT_SECONDS: "120"
  ENABLE_TELEGRAM_POLLING: "false"
  SCHEDULER_MAX_CONCURRENT_JOBS: "5"

---
apiVersion: v1
kind: Secret
metadata:
  name: ai-orchestrator-secrets
  namespace: ai-orchestrator
type: Opaque
stringData:
  OPENAI_API_KEY: ""  # Set this value before deploying
  TELEGRAM_BOT_TOKEN: ""  # Optional: Set if using Telegram integration
  TELEGRAM_WEBHOOK_URL: ""  # Optional: Set if using Telegram webhooks

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-orchestrator-data
  namespace: ai-orchestrator
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard  # Adjust based on your cluster's storage class

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-orchestrator
  namespace: ai-orchestrator
  labels:
    app: ai-orchestrator
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ai-orchestrator
  template:
    metadata:
      labels:
        app: ai-orchestrator
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ai-orchestrator
        image: ai-orchestrator:latest  # Replace with your actual image
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: APP_NAME
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: ENVIRONMENT
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: DATABASE_URL
        - name: LLM_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: LLM_PROVIDER
        - name: OPENAI_MODEL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: OPENAI_MODEL
        - name: OLLAMA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: OLLAMA_BASE_URL
        - name: OLLAMA_MODEL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: OLLAMA_MODEL
        - name: FRONTEND_URL
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: FRONTEND_URL
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: CORS_ORIGINS
        - name: MAX_AGENT_ITERATIONS
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: MAX_AGENT_ITERATIONS
        - name: DEFAULT_AGENT_TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: DEFAULT_AGENT_TIMEOUT_SECONDS
        - name: ENABLE_TELEGRAM_POLLING
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: ENABLE_TELEGRAM_POLLING
        - name: SCHEDULER_MAX_CONCURRENT_JOBS
          valueFrom:
            configMapKeyRef:
              name: ai-orchestrator-config
              key: SCHEDULER_MAX_CONCURRENT_JOBS
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: OPENAI_API_KEY
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: TELEGRAM_BOT_TOKEN
              optional: true
        - name: TELEGRAM_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: ai-orchestrator-secrets
              key: TELEGRAM_WEBHOOK_URL
              optional: true
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ai-orchestrator-data
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: ai-orchestrator
  namespace: ai-orchestrator
  labels:
    app: ai-orchestrator
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: ai-orchestrator

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-orchestrator-hpa
  namespace: ai-orchestrator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-orchestrator-pdb
  namespace: ai-orchestrator
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-orchestrator
